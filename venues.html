<!DOCTYPE html>
<html>
<head>
<title>Venues | Booking With a Smile</title>
<meta charset="UTF-8">
</head>

<body>

<h1>Venues</h1>

<p>Register your venue to book live music.</p>

<form name="venue-application" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="venue-application">

<p>
<label>Venue Name:<br>
<input type="text" name="venue-name" required>
</label>
</p>

<p>
<label>Contact Email:<br>
<input type="email" name="email" required>
</label>
</p>

<p>
<label>Location:<br>
<input type="text" name="location">
</label>
</p>

<p>
<label>Message:<br>
<textarea name="message"></textarea>
</label>
</p>

<p>
<button type="submit">Register Venue</button>
</p>

</form>

<p><a href="index.html">Return Home</a></p>

</body>
</html>
